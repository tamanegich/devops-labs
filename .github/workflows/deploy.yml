name: Deploy

on:
    workflow_run:
        workflows:
            - Build
        types:
            - completed
        tags:
            - "v[0-9]*"

jobs:
    deploy:
        name: Deploy to target node
        runs-on: self-hosted
        if: github.event.workflow_run.conclusion == 'success'
        environment: production

        steps:
            - uses: actions/checkout@v4
              with:
                  ref: ${{ github.event.workflow_run.head_sha }}

            - name: Set image tag
              id: tag
              run: echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

            - name: Set up SSH agent
              uses: webfactory/ssh-agent@v0.9.0
              with:
                  ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

            - name: Add target host to known hosts
              run: ssh-keyscan -H "$TARGET_HOST" >> ~/.ssh/known_hosts
              env:
                  TARGET_HOST: ${{ secrets.TARGET_HOST }}

            - name: Deploy to target node via SSH
              run: |
                  ssh "$TARGET_USER@$TARGET_HOST" \
                    "IMAGE='ghcr.io/${{ github.repository }}:${{ github.event.workflow_run.head_branch }}' \
                     DB_PASSWORD='$DB_PASSWORD' \
                     DB_NAME='$DB_NAME' \
                     DB_USER='$DB_USER' \
                     bash -s" < scripts/deploy.sh
              env:
                  TARGET_USER: ${{ secrets.TARGET_USER }}
                  TARGET_HOST: ${{ secrets.TARGET_HOST }}
                  DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
                  DB_NAME: ${{ vars.DB_NAME }}
                  DB_USER: ${{ vars.DB_USER }}

            - name: Verify deployment
              run: |
                  ssh "$TARGET_USER@$TARGET_HOST" "bash -s" < scripts/verify.sh
              env:
                  TARGET_USER: ${{ secrets.TARGET_USER }}
                  TARGET_HOST: ${{ secrets.TARGET_HOST }}
