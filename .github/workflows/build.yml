name: Build

on:
    workflow_run:
        workflows:
            - Test
        types:
            - completed
        branches:
            - master
    push:
        tags:
            - "v[0-9]*"

jobs:
    check:
        name: Check lint and test passed
        runs-on: ubuntu-latest
        outputs:
            should_build: ${{ steps.check.outputs.should_build }}
        steps:
            - name: Verify triggering workflows succeeded
              id: check
              uses: actions/github-script@v8
              with:
                  script: |
                      if (context.eventName === 'push') {
                        core.setOutput('should_build', 'true');
                        return;
                      }

                      const sha = context.payload.workflow_run.head_sha;
                      const runs = await github.rest.actions.listWorkflowRunsForRepo({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        head_sha: sha,
                        per_page: 50,
                      });

                      const required = ['Lint', 'Test'];
                      for (const name of required) {
                        const run = runs.data.workflow_runs.find(
                          r => r.name === name && r.head_sha === sha && r.conclusion !== null
                        );
                        if (!run) {
                          console.log(`Workflow "${name}" not yet complete — skipping build`);
                          core.setOutput('should_build', 'false');
                          return;
                        }
                        if (run.conclusion !== 'success') {
                          console.log(`Workflow "${name}" failed (${run.conclusion}) — skipping build`);
                          core.setOutput('should_build', 'false');
                          return;
                        }
                      }
                      core.setOutput('should_build', 'true');

    build:
        name: Build & Push
        runs-on: ubuntu-latest
        needs: check
        if: needs.check.outputs.should_build == 'true'
        permissions:
            contents: read
            packages: write

        steps:
            - uses: actions/checkout@v4
              with:
                  ref: ${{ github.event.workflow_run.head_sha || github.sha }}

            - name: Log in to GitHub Container Registry
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Extract metadata
              id: meta
              uses: docker/metadata-action@v5
              with:
                  images: ghcr.io/${{ github.repository }}
                  tags: |
                      type=raw,value=latest,enable=${{ github.ref_type == 'branch' || github.event_name == 'workflow_run' }}
                      type=sha,format=long,prefix=sha-,enable=${{ github.ref_type == 'branch' || github.event_name == 'workflow_run' }}
                      type=raw,value=stable,enable=${{ github.ref_type == 'tag' }}
                      type=ref,event=tag

            - name: Build and push image
              uses: docker/build-push-action@v5
              with:
                  context: .
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
